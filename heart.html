<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Big Heart Marmora</title>
<style>
body { margin:0; overflow:hidden; background:black; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer;
let stars, heartParticles, textParticles;

let heartData = [];
let textData = [];

let showText = false;

init();
animate();

function init() {

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth/window.innerHeight,
        0.1,
        5000
    );

    camera.position.z = 650;

    renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

  
    let starGeo = new THREE.BufferGeometry();
    let starPos = new Float32Array(5000 * 3);

    for (let i = 0; i < 5000; i++) {
        starPos[i*3] = (Math.random()-0.5)*5000;
        starPos[i*3+1] = (Math.random()-0.5)*5000;
        starPos[i*3+2] = (Math.random()-0.5)*5000;
    }

    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));

    stars = new THREE.Points(
        starGeo,
        new THREE.PointsMaterial({ color:0xffffff, size:2 })
    );

    scene.add(stars);
    function heart(t) {
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = 13 * Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
        return new THREE.Vector3(x, y, 0).multiplyScalar(11);
    }

    let count = 4200;
    let heartGeo = new THREE.BufferGeometry();
    let heartPos = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {

        let start = new THREE.Vector3(
            (Math.random()-0.5)*2200,
            (Math.random()-0.5)*2200,
            (Math.random()-0.5)*2200
        );

        let target = heart((i/count)*Math.PI*2);

        heartData.push({
            current: start,
            target: target,
            speed: Math.random()*0.006 + 0.002
        });

        heartPos[i*3] = start.x;
        heartPos[i*3+1] = start.y;
        heartPos[i*3+2] = start.z;
    }

    heartGeo.setAttribute("position", new THREE.BufferAttribute(heartPos,3));

    heartParticles = new THREE.Points(
        heartGeo,
        new THREE.PointsMaterial({
            color:0xff1e2d,
            size:2.8,
            sizeAttenuation:false
        })
    );

    scene.add(heartParticles);

    let canvas = document.createElement("canvas");
    let ctx = canvas.getContext("2d");

    canvas.width = 2000;
    canvas.height = 600;

    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

   
    ctx.font = "bold 195px Arial";

    ctx.fillText("M", canvas.width/2, canvas.height/2);

    let data = ctx.getImageData(0,0,canvas.width,canvas.height);
    let points = [];

    for (let y = 0; y < canvas.height; y += 3) {
        for (let x = 0; x < canvas.width; x += 3) {

            let i = (y * canvas.width + x) * 4;

            if (data.data[i] > 50) {
                points.push(
                    new THREE.Vector3(
                        (x - canvas.width/2) * 0.22,
                        (canvas.height/2 - y) * 0.22,
                        0
                    )
                );
            }
        }
    }

    let textGeo = new THREE.BufferGeometry();
    let textPos = new Float32Array(points.length * 3);

    for (let i = 0; i < points.length; i++) {

        let start = new THREE.Vector3(
            (Math.random()-0.5)*1800,
            (Math.random()-0.5)*1800,
            (Math.random()-0.5)*1800
        );

        textData.push({
            current: start,
            target: points[i],
            speed: Math.random()*0.01 + 0.004
        });

        textPos[i*3] = start.x;
        textPos[i*3+1] = start.y;
        textPos[i*3+2] = start.z;
    }

    textGeo.setAttribute("position", new THREE.BufferAttribute(textPos,3));

    textParticles = new THREE.Points(
        textGeo,
        new THREE.PointsMaterial({
            color:0xffffff,
            size:3,
            sizeAttenuation:false
        })
    );

    scene.add(textParticles);
    textParticles.visible = false;

    setTimeout(() => {
        showText = true;
        textParticles.visible = true;
    }, 3500);

    window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

function animate() {
    requestAnimationFrame(animate);

    stars.rotation.y += 0.0003;

    let heartPos = heartParticles.geometry.attributes.position;

    for (let i = 0; i < heartData.length; i++) {

        let p = heartData[i];

        p.current.x += (p.target.x - p.current.x) * p.speed;
        p.current.y += (p.target.y - p.current.y) * p.speed;
        p.current.z += (p.target.z - p.current.z) * p.speed;

        heartPos.array[i*3] = p.current.x;
        heartPos.array[i*3+1] = p.current.y;
        heartPos.array[i*3+2] = p.current.z;
    }

    heartPos.needsUpdate = true;

    if (showText) {

        let textPos = textParticles.geometry.attributes.position;

        for (let i = 0; i < textData.length; i++) {

            let p = textData[i];

            p.current.x += (p.target.x - p.current.x) * p.speed;
            p.current.y += (p.target.y - p.current.y) * p.speed;
            p.current.z += (p.target.z - p.current.z) * p.speed;

            textPos.array[i*3] = p.current.x;
            textPos.array[i*3+1] = p.current.y;
            textPos.array[i*3+2] = p.current.z;
        }

        textPos.needsUpdate = true;
    }

    renderer.render(scene, camera);
}
</script>

</body>
</html>
